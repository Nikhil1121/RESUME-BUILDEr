<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Card shadow -->
  <rect x="22" y="22" width="360" height="460" rx="12" fill="#00000015"/>
  <!-- Main card -->
  <rect x="20" y="20" width="360" height="460" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="20" y="20" width="360" height="80" rx="12" fill="#16a34a"/>
  <rect x="20" y="80" width="360" height="20" fill="#16a34a"/>
  <!-- Avatar circle -->
  <circle cx="70" cy="60" r="28" fill="white" opacity="0.25"/>
  <circle cx="70" cy="60" r="20" fill="white" opacity="0.5"/>
  <!-- Name lines -->
  <rect x="110" y="42" width="160" height="12" rx="4" fill="white" opacity="0.9"/>
  <rect x="110" y="62" width="100" height="8" rx="3" fill="white" opacity="0.6"/>
  <!-- Contact line -->
  <rect x="40" y="115" width="80" height="7" rx="2" fill="#6b7280"/>
  <rect x="140" y="115" width="80" height="7" rx="2" fill="#6b7280"/>
  <rect x="240" y="115" width="80" height="7" rx="2" fill="#6b7280"/>
  <line x1="40" y1="132" x2="360" y2="132" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Section: Summary -->
  <rect x="40" y="145" width="90" height="8" rx="2" fill="#16a34a"/>
  <rect x="40" y="162" width="300" height="6" rx="2" fill="#d1d5db"/>
  <rect x="40" y="174" width="280" height="6" rx="2" fill="#d1d5db"/>
  <rect x="40" y="186" width="250" height="6" rx="2" fill="#d1d5db"/>
  <!-- Section: Experience -->
  <rect x="40" y="206" width="90" height="8" rx="2" fill="#16a34a"/>
  <rect x="40" y="222" width="180" height="7" rx="2" fill="#374151"/>
  <rect x="40" y="236" width="120" height="6" rx="2" fill="#9ca3af"/>
  <rect x="40" y="250" width="300" height="5" rx="2" fill="#d1d5db"/>
  <rect x="40" y="260" width="270" height="5" rx="2" fill="#d1d5db"/>
  <rect x="40" y="282" width="160" height="7" rx="2" fill="#374151"/>
  <rect x="40" y="296" width="110" height="6" rx="2" fill="#9ca3af"/>
  <rect x="40" y="310" width="300" height="5" rx="2" fill="#d1d5db"/>
  <!-- Skills chips -->
  <rect x="40" y="336" width="90" height="8" rx="2" fill="#16a34a"/>
  <rect x="40" y="354" width="65" height="18" rx="9" fill="#dcfce7"/>
  <rect x="115" y="354" width="65" height="18" rx="9" fill="#dcfce7"/>
  <rect x="190" y="354" width="65" height="18" rx="9" fill="#dcfce7"/>
  <rect x="265" y="354" width="65" height="18" rx="9" fill="#dcfce7"/>
  <!-- Second card behind -->
  <rect x="210" y="60" width="360" height="400" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5" opacity="0.7"/>
  <rect x="210" y="60" width="360" height="70" rx="12" fill="#7c3aed" opacity="0.7"/>
  <rect x="210" y="110" width="360" height="20" fill="#7c3aed" opacity="0.7"/>
  <rect x="230" y="80" width="140" height="10" rx="3" fill="white" opacity="0.8"/>
  <rect x="230" y="148" width="90" height="7" rx="2" fill="#7c3aed" opacity="0.6"/>
  <rect x="230" y="163" width="300" height="5" rx="2" fill="#d1d5db" opacity="0.8"/>
  <rect x="230" y="174" width="270" height="5" rx="2" fill="#d1d5db" opacity="0.8"/>
</svg>
